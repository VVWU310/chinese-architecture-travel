<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>古建行记</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root{--ink:#201c18;--muted:#70675d;--paper:#f6f0e6;--paper2:#eadfce;--line:#c9baa3;--seal:#a23b2b;--pine:#24483c;--white:#fffaf1;--shadow:0 22px 70px rgba(42,32,22,.14)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);background:linear-gradient(90deg,rgba(32,28,24,.035) 1px,transparent 1px),linear-gradient(rgba(32,28,24,.03) 1px,transparent 1px),radial-gradient(circle at 15% 9%,rgba(177,132,54,.18),transparent 30%),var(--paper);background-size:34px 34px,34px 34px,auto,auto;font-family:"Noto Serif SC","Songti SC",SimSun,Georgia,serif}button,input,textarea,select{font:inherit}button{cursor:pointer}h1,h2,h3,p{margin:0}.app{min-height:100vh;display:grid;grid-template-columns:318px minmax(0,1fr)}.sidebar{position:sticky;top:0;height:100vh;padding:34px 28px;display:flex;flex-direction:column;gap:26px;border-right:1px solid var(--line);background:rgba(255,250,241,.84);backdrop-filter:blur(18px)}.seal{width:54px;height:54px;display:grid;place-items:center;border-radius:6px;background:var(--seal);color:var(--white);box-shadow:inset 0 0 0 2px rgba(255,250,241,.34);font-size:24px}h1{margin-top:18px;font-size:38px;line-height:1.08}.lead{color:var(--muted);line-height:1.8;font-size:15px}.sidebar .lead{margin-top:14px}.nav{display:grid;gap:8px;min-height:0;overflow:auto}.nav button,.ghost,.tab{border:1px solid var(--line);border-radius:6px;background:rgba(255,250,241,.72);color:var(--ink)}.nav button{min-height:43px;padding:10px 12px;text-align:left;border-color:transparent;background:transparent}.nav button.active,.nav button:hover{border-color:var(--line);background:rgba(234,223,206,.64)}.add-box{margin-top:auto;display:grid;gap:9px}.field{width:100%;min-height:42px;border:1px solid var(--line);border-radius:6px;background:rgba(255,250,241,.88);padding:10px 12px;color:var(--ink);outline:none}.field:focus{border-color:var(--seal);box-shadow:0 0 0 3px rgba(162,59,43,.12)}.primary{min-height:44px;border:0;border-radius:6px;background:var(--pine);color:var(--white);padding:10px 15px}.ghost{min-height:40px;padding:8px 12px}main{min-width:0;padding:34px}.home,.detail{max-width:1120px;margin:0 auto}.hero{display:grid;gap:18px;padding:26px;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);background:rgba(255,250,241,.76)}.hero-text{max-width:760px;display:grid;gap:12px}.meta{color:var(--seal);font-size:13px}.hero h2{font-size:42px;line-height:1.14}.toolbar{display:flex;flex-wrap:wrap;justify-content:space-between;gap:12px;margin:24px 0}.tabs{display:flex;flex-wrap:wrap;gap:8px}.tab{min-height:38px;padding:8px 14px;border-radius:999px}.tab.active{border-color:var(--ink);background:var(--ink);color:var(--white)}.map-shell{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:18px;align-items:stretch}.map-panel{position:relative;min-height:610px;border:1px solid var(--line);border-radius:8px;background:var(--paper2);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,250,241,.48)}#travelMap{position:absolute;inset:0;background:#efe4d3}.map-fallback{position:absolute;inset:18px;display:none;place-items:center;text-align:center;padding:24px;border:1px dashed var(--line);border-radius:8px;background:rgba(255,250,241,.86);color:var(--muted);line-height:1.75;z-index:2}.map-fallback.show{display:grid}.leaflet-container{font-family:"Noto Serif SC","Songti SC",SimSun,Georgia,serif;background:#efe4d3}.leaflet-control-zoom a{color:var(--ink)!important;background:rgba(255,250,241,.92)!important;border-bottom-color:var(--line)!important}.leaflet-control-attribution{font-size:10px;background:rgba(255,250,241,.72)!important}.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--white);color:var(--ink);box-shadow:0 14px 36px rgba(42,32,22,.18)}.leaflet-popup-content{margin:12px 14px;line-height:1.55}.map-popup{display:grid;gap:7px;min-width:138px}.map-popup strong{font-size:15px;color:var(--ink)}.map-popup span{color:var(--muted);font-size:13px}.map-popup button{min-height:32px;border:0;border-radius:6px;background:var(--pine);color:var(--white);padding:6px 10px}.map-pin{width:26px;height:26px;border-radius:50% 50% 50% 8px;background:var(--seal);border:2px solid var(--white);box-shadow:0 8px 18px rgba(42,32,22,.24);transform:rotate(-45deg)}.map-pin:after{content:"";position:absolute;width:8px;height:8px;border-radius:50%;background:var(--white);left:7px;top:7px}.map-pin.active{background:var(--ink)}.map-side{border:1px solid var(--line);border-radius:8px;background:rgba(255,250,241,.82);padding:18px;display:grid;gap:16px;align-content:start}.map-list{display:grid;gap:8px;max-height:302px;overflow:auto}.map-item{display:grid;grid-template-columns:1fr 34px;gap:8px;align-items:center;border:1px solid transparent;border-radius:6px;padding:8px;background:transparent;text-align:left}.map-item.active,.map-item:hover{border-color:var(--line);background:rgba(234,223,206,.55)}.map-item-main{display:grid;gap:4px;min-width:0;border:0;background:transparent;text-align:left;color:var(--ink);padding:0}.map-item-title{font-size:15px;line-height:1.35}.icon-btn{width:34px;height:34px;border:1px solid var(--line);border-radius:6px;background:rgba(255,250,241,.72);color:var(--seal);display:grid;place-items:center}.selected-place{display:grid;gap:10px;padding-top:4px;border-top:1px solid var(--line)}.selected-place h3{font-size:24px;line-height:1.22}.map-empty{padding:22px;border:1px dashed var(--line);border-radius:8px;color:var(--muted);line-height:1.7}.detail{display:none}.detail.open{display:grid;gap:18px}.detail-head{display:flex;justify-content:space-between;align-items:start;gap:14px}.detail-title{display:grid;gap:10px}.detail h2{font-size:44px;line-height:1.1}.detail-layout{display:grid;grid-template-columns:minmax(0,1.22fr) minmax(300px,.78fr);gap:18px;align-items:start}.panel{border:1px solid var(--line);border-radius:8px;background:rgba(255,250,241,.84)}.visual-stack{display:grid;gap:18px}.artwork-panel{overflow:hidden;background:#efe4d3}.artwork{width:100%;display:block;aspect-ratio:4/3;object-fit:cover;object-position:center;border-bottom:1px solid var(--line)}.artwork-caption{padding:14px 18px;display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px;line-height:1.6}.component-panel{overflow:hidden;background:#efe4d3}.component-art{width:100%;display:block;aspect-ratio:4/3;object-fit:cover;object-position:center;border-bottom:1px solid var(--line)}.component-caption{padding:14px 18px;display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px;line-height:1.6}.component-switch{padding:0 18px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.component-switch button{min-height:34px;border:1px solid var(--line);border-radius:6px;background:rgba(255,250,241,.72);color:var(--ink);font-size:13px}.component-switch button.active{background:var(--ink);border-color:var(--ink);color:var(--white)}.side{display:grid;gap:18px;align-content:start}.info,.note{padding:20px;display:grid;gap:14px}.info-text{display:grid;gap:14px;color:var(--muted);line-height:1.75}.study-block{display:grid;gap:8px;padding-top:12px;border-top:1px solid rgba(201,186,163,.72)}.study-block h4{margin:0;color:var(--ink);font-size:15px;line-height:1.4}.study-list{margin:0;padding-left:18px;display:grid;gap:7px}.study-list li{padding-left:2px}.study-tags{display:flex;flex-wrap:wrap;gap:7px}.study-tag{border:1px solid rgba(201,186,163,.86);border-radius:999px;padding:4px 9px;background:rgba(234,223,206,.42);color:var(--ink);font-size:13px;line-height:1.35}textarea.field{min-height:186px;resize:vertical;line-height:1.7}.lightbox{position:fixed;inset:0;z-index:20;display:none;background:rgba(32,28,24,.86);padding:24px}.lightbox.open{display:grid;grid-template-rows:auto 1fr;gap:16px}.lightbox-head{display:flex;justify-content:space-between;align-items:center;color:var(--white)}.lightbox-body{display:grid;place-items:center;min-height:0}.lightbox img{max-width:100%;max-height:100%;border-radius:8px;background:#efe4d3}.toast{position:fixed;right:22px;bottom:22px;padding:12px 14px;border-radius:6px;background:var(--ink);color:var(--white);opacity:0;transform:translateY(12px);pointer-events:none;transition:opacity .2s ease,transform .2s ease}.toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:980px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.map-shell,.detail-layout{grid-template-columns:1fr}.map-panel{min-height:540px}.artwork-caption{display:grid}}
    @media(max-width:620px){main{padding:18px}.sidebar{padding:24px 20px}.hero{padding:20px}.hero h2,.detail h2{font-size:32px}h1{font-size:34px}.detail-head{display:grid}.map-panel{min-height:460px}.marker-label{display:none}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div><div class="seal" aria-hidden="true">行</div><h1>古建行记</h1><p class="lead">给中国古建筑旅行做一册安静、可增补的私人索引。地点、年代、插图和现场点评都留在同一个页面里。</p></div>
      <nav class="nav" id="placeNav" aria-label="地点导航"></nav>
      <form class="add-box" id="addForm">
        <input class="field" id="newName" maxlength="18" placeholder="新增地点，如：佛光寺东大殿" required>
        <input class="field" id="newEra" maxlength="24" placeholder="年代，如：唐大中十一年">
        <select class="field" id="newType"><option value="hall">殿堂</option><option value="tower">楼阁</option><option value="pagoda">塔</option><option value="gate">门楼</option></select>
        <button class="primary" type="submit">加入行记</button>
      </form>
    </aside>
    <main>
      <section class="home" id="homeView">
        <div class="hero"><div class="hero-text"><p class="meta">中国古建筑 · 地图行记</p><h2>用点位记录到访过的古建筑，把路线、年代和现场感受放在同一张地图上。</h2><p class="lead">点击地图点位查看详情；左侧可以新增地点，首页点位列表中可以删除不需要的记录。</p></div></div>
        <div class="toolbar"><div class="tabs" id="typeTabs" aria-label="类型筛选"></div><button class="ghost" id="resetData" type="button">恢复示例</button></div>
        <div class="map-shell">
          <section class="map-panel" aria-label="古建筑地图点位">
            <div id="travelMap"></div>
            <div class="map-fallback" id="mapFallback">真实地图插件未加载。请确认网络可访问后刷新；点位列表和详情仍可使用。</div>
          </section>
          <aside class="map-side">
            <div><p class="meta">当前点位</p><div class="selected-place" id="selectedPlace"></div></div>
            <div><p class="meta">点位列表</p><div class="map-list" id="placeMap"></div></div>
          </aside>
        </div>
      </section>
      <section class="detail" id="detailView">
        <div class="detail-head"><div class="detail-title"><button class="ghost" id="backHome" type="button">返回首页</button><p class="meta" id="detailEra"></p><h2 id="detailName"></h2></div><button class="primary" id="randomizeDrawing" type="button">放大构件图</button></div>
        <div class="detail-layout">
          <div class="visual-stack">
            <section class="panel artwork-panel"><img class="artwork" id="detailArtwork" src="assets/ancient-hall-illustration.png" alt="中国古建筑测绘风格插图"><div class="artwork-caption"><span>原创古建测绘风格插图</span><span>墨线 · 淡彩 · 纸本质感</span></div></section>
            <section class="panel component-panel"><img class="component-art" id="componentArtwork" src="assets/foguang-component-detail.png" alt="建筑构件细节原创插图"><div class="component-caption"><span id="componentCaptionTitle">建筑构件细节 1</span><span>斗栱 · 檐口 · 梁架</span></div><div class="component-switch" id="componentSwitch" aria-label="构件图切换"></div></section>
          </div>
          <div class="side"><section class="panel info"><h3>建筑小记</h3><div class="info-text"><p id="detailIntro"></p><div class="study-block"><h4>观看重点</h4><ul class="study-list" id="detailFocus"></ul></div><div class="study-block"><h4>核心细节</h4><div class="study-tags" id="detailCore"></div></div><div class="study-block"><h4>现场记录</h4><p id="detailHint"></p></div></div></section><section class="panel note"><h3>现场点评</h3><textarea class="field" id="noteInput" placeholder="写下动线、尺度、斗栱观感、光线、修缮痕迹或再次到访计划。"></textarea><button class="primary" id="saveNote" type="button">保存点评</button></section></div>
        </div>
      </section>
    </main>
  </div>
  <div class="lightbox" id="componentLightbox"><button class="ghost" id="closeLightbox" type="button">返回详情</button><div class="lightbox-body"><img id="lightboxImage" src="assets/foguang-component-detail.png" alt="建筑构件细节放大图"></div></div><div class="toast" id="toast">已保存</div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const defaultPlaces=[{id:"foguang",name:"佛光寺东大殿",era:"唐大中十一年，857",type:"hall",image:"assets/foguang-east-hall.png",componentImage:"assets/foguang-component-detail.png",componentImages:["assets/foguang-component-detail.png","assets/foguang-component-detail-2.png","assets/foguang-component-detail-3.png"],lat:38.8575,lng:113.3663,intro:"现存唐代木构代表之一，面阔七间，举折舒展，斗栱尺度清晰，整体气质沉稳开阔。",hint:"可重点记录屋顶坡度、檐下阴影、柱网节奏和室内佛坛与梁架的关系。"},{id:"yingxian",name:"应县木塔",era:"辽清宁二年，1056",type:"pagoda",image:"assets/yingxian-wooden-pagoda.png",componentImage:"assets/yingxian-component-detail.png",componentImages:["assets/yingxian-component-detail.png","assets/yingxian-component-detail-2.png","assets/yingxian-component-detail-3.png"],lat:39.5596,lng:113.1908,intro:"全木结构楼阁式塔，外观五层，内部暗层丰富，塔身比例高耸而不轻浮。",hint:"可观察逐层收分、平坐栏杆、斜撑与塔身稳定感。"},{id:"dulesi",name:"独乐寺观音阁",era:"辽统和二年，984",type:"tower",image:"assets/dule-temple-guanyin-pavilion.png",componentImage:"assets/dule-component-detail.png",componentImages:["assets/dule-component-detail.png","assets/dule-component-detail-2.png","assets/dule-component-detail-3.png"],lat:40.0472,lng:117.4074,intro:"高大楼阁式木构，外两层内三层，空间围绕观音像展开，檐口与柱列形成强烈纵向秩序。",hint:"可写下进入院落后的尺度变化，以及阁内观看巨像时的仰视经验。"},{id:"jinci",name:"晋祠圣母殿",era:"北宋天圣年间，1023-1032",type:"hall",image:"assets/jinci-holy-mother-hall.png",componentImage:"assets/jinci-component-detail.png",componentImages:["assets/jinci-component-detail.png","assets/jinci-component-detail-2.png","assets/jinci-component-detail-3.png"],lat:37.7081,lng:112.4382,intro:"宋代殿堂代表，前廊宽阔，柱身有明显侧脚与生起，空间层次比外观更细腻。",hint:"可比较殿前鱼沼飞梁、廊柱排列和屋面曲线带来的视觉重心。"},{id:"zhenguo",name:"镇国寺万佛殿",era:"五代北汉天会七年，963",type:"hall",image:"assets/zhenguo-wanfo-hall.png",componentImage:"assets/zhenguo-component-detail.png",componentImages:["assets/zhenguo-component-detail.png","assets/zhenguo-component-detail-2.png","assets/zhenguo-component-detail-3.png"],lat:37.2478,lng:112.1843,intro:"五代木构遗存，结构简洁直接，保留唐宋之间过渡阶段的比例和构造特征。",hint:"可记录柱头铺作、梁架疏密，以及早期木构的朴素力量。"},{id:"longxing",name:"隆兴寺摩尼殿",era:"北宋皇祐四年，1052",type:"gate",image:"assets/longxing-mani-hall.png",componentImage:"assets/longxing-component-detail.png",componentImages:["assets/longxing-component-detail.png","assets/longxing-component-detail-2.png","assets/longxing-component-detail-3.png"],lat:38.1467,lng:114.5703,intro:"殿身四面出抱厦，平面与立面变化丰富，转角与屋面组合很适合做线稿拆解。",hint:"可观察十字形屋面、抱厦转折和正立面视觉中心。"}];
    const typeLabels={all:"全部",hall:"殿堂",tower:"楼阁",pagoda:"塔",gate:"门楼"};let places=loadPlaces(),currentType="all",currentPlace=places[0]||null,currentComponentIndex=0,mapInstance=null,markerLayer=null,placeMarkers=new Map();const homeView=document.getElementById("homeView"),detailView=document.getElementById("detailView"),placeNav=document.getElementById("placeNav"),placeMap=document.getElementById("placeMap"),travelMapEl=document.getElementById("travelMap"),mapFallback=document.getElementById("mapFallback"),selectedPlace=document.getElementById("selectedPlace"),typeTabs=document.getElementById("typeTabs"),componentArtwork=document.getElementById("componentArtwork"),componentSwitch=document.getElementById("componentSwitch"),componentCaptionTitle=document.getElementById("componentCaptionTitle"),componentLightbox=document.getElementById("componentLightbox"),lightboxImage=document.getElementById("lightboxImage"),noteInput=document.getElementById("noteInput"),toast=document.getElementById("toast");
    function loadPlaces(){const saved=localStorage.getItem("ancient-places");if(!saved)return defaultPlaces;const parsed=JSON.parse(saved);const byId=Object.fromEntries(defaultPlaces.map(p=>[p.id,p]));return parsed.map((p,i)=>{const fallback=fallbackCoord(i),base=byId[p.id]||{};return {...p,image:p.image||base.image||"assets/ancient-hall-illustration.png",componentImage:p.componentImage||base.componentImage||"assets/foguang-component-detail.png",componentImages:p.componentImages||base.componentImages||[p.componentImage||base.componentImage||"assets/foguang-component-detail.png"],lat:p.lat||base.lat||fallback.lat,lng:p.lng||base.lng||fallback.lng}})}function savePlaces(){localStorage.setItem("ancient-places",JSON.stringify(places))}function placeId(name){return"place-"+name.trim().toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g,"-")+"-"+Date.now().toString(36)}function fallbackCoord(i){const pts=[{lat:34.34,lng:108.94},{lat:35.68,lng:113.62},{lat:31.23,lng:121.47},{lat:30.66,lng:104.06},{lat:32.06,lng:118.79},{lat:36.06,lng:103.83}];return pts[i%pts.length]}function render(){renderTabs();renderNav();renderMap()}function renderTabs(){typeTabs.innerHTML="";Object.entries(typeLabels).forEach(([key,label])=>{const b=document.createElement("button");b.type="button";b.textContent=label;b.className=key===currentType?"tab active":"tab";b.onclick=()=>{currentType=key;render()};typeTabs.appendChild(b)})}function renderNav(){placeNav.innerHTML="";places.forEach(place=>{const b=document.createElement("button");b.type="button";b.textContent=place.name;b.className=currentPlace&&place.id===currentPlace.id?"active":"";b.onclick=()=>openDetail(place.id);placeNav.appendChild(b)})}
    function renderMap(){const filtered=currentType==="all"?places:places.filter(p=>p.type===currentType);placeMap.innerHTML="";if(!filtered.length){selectedPlace.innerHTML=`<div class="map-empty">暂无点位。可以从左侧新增一个地点。</div>`;if(markerLayer)markerLayer.clearLayers();return}if(!currentPlace||!filtered.some(p=>p.id===currentPlace.id))currentPlace=filtered[0];if(window.L){initMap();markerLayer.clearLayers();placeMarkers.clear();filtered.forEach(place=>{const marker=L.marker([place.lat,place.lng],{icon:pinIcon(place.id===currentPlace.id)}).addTo(markerLayer);marker.bindPopup(`<div class="map-popup"><strong>${escapeHtml(place.name)}</strong><span>${typeLabels[place.type]} · ${escapeHtml(place.era||"年代待补")}</span><button type="button" data-detail-id="${escapeHtml(place.id)}">查看详情</button></div>`);marker.on("click",()=>selectPlace(place.id));marker.on("popupopen",e=>{const btn=e.popup.getElement().querySelector("[data-detail-id]");if(btn)btn.onclick=()=>openDetail(btn.dataset.detailId)});placeMarkers.set(place.id,marker)});fitMap(filtered)}else{mapFallback.classList.add("show")}filtered.forEach(place=>{const item=document.createElement("div");item.className=place.id===currentPlace.id?"map-item active":"map-item";item.innerHTML=`<button class="map-item-main" type="button"><span class="map-item-title">${escapeHtml(place.name)}</span><span class="meta">${typeLabels[place.type]} · ${escapeHtml(place.era||"年代待补")}</span></button><button class="icon-btn" type="button" title="删除地点" aria-label="删除 ${escapeHtml(place.name)}">×</button>`;item.querySelector(".map-item-main").onclick=()=>selectPlace(place.id);item.querySelector(".icon-btn").onclick=()=>deletePlace(place.id);placeMap.appendChild(item)});renderSelectedPlace()}function initMap(){if(mapInstance)return;mapFallback.classList.remove("show");mapInstance=L.map(travelMapEl,{scrollWheelZoom:false,zoomControl:true}).setView([36.2,112.8],5);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18,attribution:"&copy; OpenStreetMap"}).addTo(mapInstance);markerLayer=L.layerGroup().addTo(mapInstance)}function pinIcon(active){return L.divIcon({className:"",html:`<div class="map-pin${active?" active":""}"></div>`,iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-28]})}function fitMap(items){if(!mapInstance||!items.length)return;const bounds=L.latLngBounds(items.map(p=>[p.lat,p.lng]));mapInstance.fitBounds(bounds.pad(.28),{maxZoom:7});setTimeout(()=>mapInstance.invalidateSize(),60)}function selectPlace(id){currentPlace=places.find(p=>p.id===id)||places[0]||null;renderNav();renderMap();if(window.L&&mapInstance&&currentPlace){const marker=placeMarkers.get(currentPlace.id);mapInstance.setView([currentPlace.lat,currentPlace.lng],Math.max(mapInstance.getZoom(),6),{animate:true});if(marker)marker.openPopup()}}function deletePlace(id){const target=places.find(p=>p.id===id);if(!target)return;places=places.filter(p=>p.id!==id);localStorage.removeItem(`note-${id}`);currentPlace=places[0]||null;savePlaces();render();toast.textContent=`已删除 ${target.name}`;toast.classList.add("show");setTimeout(()=>{toast.classList.remove("show");toast.textContent="已保存"},1400)}function renderSelectedPlace(){if(!currentPlace){selectedPlace.innerHTML=`<div class="map-empty">暂无点位。可以从左侧新增一个地点。</div>`;return}selectedPlace.innerHTML=`<h3>${escapeHtml(currentPlace.name)}</h3><p class="lead">${typeLabels[currentPlace.type]} · ${escapeHtml(currentPlace.era||"年代待补")}</p><p class="lead">${escapeHtml(currentPlace.intro)}</p><button class="primary" id="openCurrentDetail" type="button">查看详情</button><button class="ghost" id="deleteCurrentPlace" type="button">删除地点</button>`;document.getElementById("openCurrentDetail").onclick=()=>openDetail(currentPlace.id);document.getElementById("deleteCurrentPlace").onclick=()=>deletePlace(currentPlace.id)}
    function componentImagesFor(place){const images=place.componentImages&&place.componentImages.length?place.componentImages:[place.componentImage||"assets/foguang-component-detail.png"];return images.slice(0,3)}function setComponentImage(index){const images=componentImagesFor(currentPlace||{});currentComponentIndex=Math.max(0,Math.min(index,images.length-1));componentArtwork.src=images[currentComponentIndex];componentArtwork.alt=(currentPlace?currentPlace.name:"")+"建筑构件细节原创插图";componentCaptionTitle.textContent=`建筑构件细节 ${currentComponentIndex+1}`;componentSwitch.querySelectorAll("button").forEach((btn,i)=>btn.classList.toggle("active",i===currentComponentIndex))}function renderComponentSwitch(place){const images=componentImagesFor(place);componentSwitch.innerHTML=images.map((_,i)=>`<button type="button" class="${i===currentComponentIndex?"active":""}" data-component-index="${i}">构架 ${i+1}</button>`).join("");componentSwitch.querySelectorAll("button").forEach(btn=>btn.onclick=()=>setComponentImage(Number(btn.dataset.componentIndex)))}function openComponentLightbox(){if(!currentPlace)return;lightboxImage.src=componentArtwork.src;lightboxImage.alt=currentPlace.name+` 构架 ${currentComponentIndex+1} 放大图`;componentLightbox.classList.add("open")}function closeComponentLightbox(){componentLightbox.classList.remove("open")}    function renderStudy(place){const fallback={focus:["先看整体比例，再看屋面、柱网、斗栱与空间动线。","记录最打动你的一个构件细节，以及它和整体气质的关系。"],core:["屋顶曲线","柱网节奏","斗栱尺度","光线与阴影"],hint:place.hint||"先从年代、屋顶、柱网、斗栱和现场感受五个角度补充观察。"};const data={foguang:{focus:["站在月台前先看七开间面阔和屋顶举折，感受唐构的舒展比例。","靠近檐下观察斗栱尺度、补间铺作和柱头铺作的节奏差异。","进入殿内看梁架与佛坛的位置关系，记录空间重心如何被屋顶和佛像共同控制。"],core:["唐代木构","七开间面阔","斗栱尺度","举折舒展","佛坛与梁架"],hint:"重点拍檐下阴影、转角铺作、柱列透视和屋面曲线；点评里可写‘远看比例’和‘近看构件’的差异。"},yingxian:{focus:["从远处看塔身逐层收分，先判断它为什么高而不飘。","绕塔观察平坐、栏杆、出檐和暗层带来的水平分节。","近看木构节点，记录斜撑、铺作和塔身稳定感之间的关系。"],core:["辽代木塔","逐层收分","平坐栏杆","暗层结构","斜撑稳定"],hint:"建议用同一角度拍远景、中景、近景三张；点评里记录塔身收分、檐口层次和木构密度。"},dulesi:{focus:["进院后先看观音阁压住庭院的高度感，再进入阁内感受仰视尺度。","观察外两层内三层的空间差异，注意楼层与巨像之间的关系。","看柱头、梁架、檐下铺作如何共同服务于高大内部空间。"],core:["辽代楼阁","外两层内三层","高大柱列","巨像空间","檐下铺作"],hint:"记录从院门到阁前的尺度变化；构件图可重点对照柱头、梁栿和檐下层叠。"},jinci:{focus:["先看圣母殿前廊的深度，判断它如何把室外过渡成半室内空间。","观察柱身侧脚、生起和屋面曲线，感受宋构更细腻的比例控制。","把圣母殿与鱼沼飞梁一起看，记录水面、桥、殿前廊之间的空间关系。"],core:["宋代殿堂","前廊空间","柱身侧脚","生起","鱼沼飞梁"],hint:"适合记录廊下光线、柱列透视和屋檐压低后的亲近感；点评里可比较它和唐构的气质差异。"},zhenguo:{focus:["先看万佛殿的朴素体量，注意它没有过度装饰但结构感很强。","近看柱头铺作、梁架疏密和檐下构件，理解五代木构的直接性。","观察墙身、屋顶和柱网之间的比例，记录唐宋过渡期的力量感。"],core:["五代木构","柱头铺作","梁架疏朗","早期比例","朴素结构"],hint:"重点写‘少而有力’：构件不繁，但每个结构节点都很明确；适合拍柱头、梁端和屋面交界。"},longxing:{focus:["先绕殿一周，看四面抱厦如何改变普通殿堂的轮廓。","站在转角观察屋面交接、抱厦出挑和檐口方向变化。","近看转角铺作与梁架关系，记录复杂平面如何被木构组织起来。"],core:["宋代摩尼殿","四面抱厦","十字屋面","转角铺作","屋面交接"],hint:"重点记录转角和屋面相交处；点评里可写它和普通矩形殿堂相比，空间为什么更有流动感。"}}[place.id]||fallback;document.getElementById("detailFocus").innerHTML=data.focus.map(item=>`<li>${escapeHtml(item)}</li>`).join("");document.getElementById("detailCore").innerHTML=data.core.map(item=>`<span class="study-tag">${escapeHtml(item)}</span>`).join("");document.getElementById("detailHint").textContent=data.hint}    function openDetail(id){currentPlace=places.find(p=>p.id===id)||places[0];if(!currentPlace)return;document.getElementById("detailName").textContent=currentPlace.name;document.getElementById("detailEra").textContent=`${typeLabels[currentPlace.type]} · ${currentPlace.era||"年代待补"}`;document.getElementById("detailIntro").textContent=currentPlace.intro;renderStudy(currentPlace);noteInput.value=localStorage.getItem(`note-${currentPlace.id}`)||"";document.getElementById("detailArtwork").src=currentPlace.image||"assets/ancient-hall-illustration.png";document.getElementById("detailArtwork").alt=currentPlace.name+"测绘风格插图";currentComponentIndex=0;renderComponentSwitch(currentPlace);setComponentImage(0);homeView.style.display="none";detailView.classList.add("open");renderNav();window.scrollTo({top:0,behavior:"smooth"})}function backHome(){homeView.style.display="";detailView.classList.remove("open");render()}
    function escapeHtml(v){return String(v).replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"})[ch])}function escapeSvg(v){return escapeHtml(v)}document.getElementById("backHome").onclick=backHome;document.getElementById("randomizeDrawing").onclick=openComponentLightbox;document.getElementById("closeLightbox").onclick=closeComponentLightbox;componentLightbox.onclick=e=>{if(e.target===componentLightbox)closeComponentLightbox()};document.getElementById("saveNote").onclick=()=>{if(!currentPlace)return;localStorage.setItem(`note-${currentPlace.id}`,noteInput.value);toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1400)};document.getElementById("resetData").onclick=()=>{places=defaultPlaces;currentPlace=places[0];savePlaces();render()};document.getElementById("addForm").onsubmit=e=>{e.preventDefault();const name=document.getElementById("newName").value.trim();if(!name)return;const era=document.getElementById("newEra").value.trim(),type=document.getElementById("newType").value,point=fallbackCoord(places.length),place={id:placeId(name),name,era,type,image:"assets/ancient-hall-illustration.png",componentImage:"assets/foguang-component-detail.png",componentImages:["assets/foguang-component-detail.png","assets/foguang-component-detail-2.png","assets/foguang-component-detail-3.png"],lat:point.lat,lng:point.lng,intro:"新增地点，简介待补。可在这里记录建筑形制、保存状态、到访路线和观看重点。",hint:"先从年代、屋顶、柱网、斗栱和现场感受五个角度补充观察。"};places=[place,...places];currentPlace=place;savePlaces();e.target.reset();render();selectPlace(place.id)};render();
